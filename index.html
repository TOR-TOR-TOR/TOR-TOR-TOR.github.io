<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>tor.dev</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0d0d;
  color: #e8e8e8;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  min-height: 100vh;
  padding: 3rem 2rem 6rem;
  max-width: 700px;
  margin: 0 auto;
}

#indicator {
  position: fixed;
  top: 1.4rem;
  right: 2rem;
  font-size: 11px;
  color: #444;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  letter-spacing: 0.1em;
}
#indicator .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #4af626;
  animation: pulse 2.5s infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.3; }
}

.line { display: block; white-space: pre-wrap; word-break: break-word; }
.green { color: #4af626; }
.dim   { color: #555; }

a { color: #e8e8e8; text-underline-offset: 3px; }
a:hover { color: #4af626; }

.caret {
  display: inline-block;
  width: 8px; height: 1em;
  background: #e8e8e8;
  vertical-align: middle;
  margin-left: 1px;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

#input-row {
  display: none;
  align-items: center;
  gap: 0;
  margin-top: 0;
}
#input-row.visible { display: flex; }
#input-prompt { color: #4af626; }
#cmd-input {
  background: none;
  border: none;
  outline: none;
  color: #e8e8e8;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  line-height: 1.8;
  flex: 1;
  caret-color: #4af626;
  padding-left: 0.5rem;
}
</style>
</head>
<body>

<div id="indicator"><span class="dot"></span>online</div>
<div id="out"></div>
<div id="input-row">
  <span id="input-prompt">~</span>
  <input id="cmd-input" autocomplete="off" spellcheck="false" autofocus/>
</div>

<script>
const out = document.getElementById('out');
const inputRow = document.getElementById('input-row');
const cmdInput = document.getElementById('cmd-input');

const sequence = [
  [`<span class="dim">  tor.dev</span>`, 0],
  [`<span class="dim">  ────────────────────────────────────</span>`, 80],
  [``, 280],

  [`<span class="green">~</span> whoami`, 500, true],
  [`Tor`, 80],
  [`Data Scientist & Developer`, 60],
  [``, 280],

  [`<span class="green">~</span> cat about.txt`, 500, true],
  [`I turn data into decisions and ideas into products.`, 60],
  [`Bridging data science and software engineering —`, 60],
  [`from ML pipelines to full-stack applications.`, 60],
  [``, 280],

  [`<span class="green">~</span> ls skills/`, 500, true],
  [`<span class="dim">languages</span>  Python  R  SQL  TypeScript`, 60],
  [`<span class="dim">data     </span>  Data Analysis  Machine Learning  Visualization`, 60],
  [`<span class="dim">web      </span>  React  Next.js  Node.js  FastAPI`, 60],
  [`<span class="dim">tools    </span>  Git  Docker  Jupyter  VS Code`, 60],
  [``, 280],

  [`<span class="green">~</span> ls projects/`, 500, true],
  [`<span class="dim">01</span>  Maternal Health Reminder System`, 60],
  [`<span class="dim">02</span>  Telegram Mpesa Payment Bot`, 60],
  [``, 280],

  [`<span class="green">~</span> cat contact.txt`, 500, true],
  [`email     <a href="mailto:swazitech001@gmail.com">swazitech001@gmail.com</a>`, 60],
  [`github    <a href="https://github.com/TOR-TOR-TOR" target="_blank">github.com/TOR-TOR-TOR</a>`, 60],
  [``, 280],

  [`<span class="green">~</span> echo $STATUS`, 500, true],
  [`<span class="green">open to work — reach out anytime.</span>`, 80],
  [``, 400],
];

function newLine(html = '') {
  const el = document.createElement('span');
  el.className = 'line';
  el.innerHTML = html;
  out.appendChild(el);
  return el;
}

function runSequence(i) {
  if (i >= sequence.length) {
    newLine(`<span class="dim">  type 'help' for available commands</span>`);
    newLine(``);
    inputRow.classList.add('visible');
    cmdInput.focus();
    return;
  }
  const [html, pause, typed] = sequence[i];
  if (typed) {
    const el = newLine();
    const promptEnd = html.lastIndexOf('</span>') + '</span>'.length;
    const promptHtml = html.slice(0, promptEnd);
    const commandText = html.slice(promptEnd).trim();
    el.innerHTML = promptHtml + ' ';
    let ci = 0;
    const cur = document.createElement('span');
    cur.className = 'caret';
    el.appendChild(cur);
    function tick() {
      if (ci < commandText.length) {
        cur.insertAdjacentText('beforebegin', commandText[ci++]);
        window.scrollTo(0, document.body.scrollHeight);
        setTimeout(tick, 50 + Math.random() * 35);
      } else {
        cur.remove();
        setTimeout(() => runSequence(i + 1), pause);
      }
    }
    tick();
  } else {
    const el = newLine(html);
    window.scrollTo(0, document.body.scrollHeight);
    setTimeout(() => runSequence(i + 1), pause);
  }
}

runSequence(0);

const commands = {
  help: () => [
    `<span class="dim">available commands:</span>`,
    `  whoami      who is this person`,
    `  about       about me`,
    `  skills      tech stack`,
    `  projects    shipped work`,
    `  contact     get in touch`,
    `  status      availability`,
    `  clear       clear terminal`,
  ],
  whoami: () => [
    `Tor`,
    `Data Scientist & Developer`,
  ],
  about: () => [
    `I turn data into decisions and ideas into products.`,
    `Bridging data science and software engineering —`,
    `from ML pipelines to full-stack applications.`,
  ],
  skills: () => [
    `<span class="dim">languages</span>  Python  R  SQL  TypeScript`,
    `<span class="dim">data     </span>  Data Analysis  Machine Learning  Visualization`,
    `<span class="dim">web      </span>  React  Next.js  Node.js  FastAPI`,
    `<span class="dim">tools    </span>  Git  Docker  Jupyter  VS Code`,
  ],
  projects: () => [
    `<span class="dim">01</span>  Maternal Health Reminder System`,
    `<span class="dim">02</span>  Telegram Mpesa Payment Bot`,
  ],
  contact: () => [
    `email     <a href="mailto:swazitech001@gmail.com">swazitech001@gmail.com</a>`,
    `github    <a href="https://github.com/TOR-TOR-TOR" target="_blank">github.com/TOR-TOR-TOR</a>`,
  ],
  status: () => [
    `<span class="green">● open to work — reach out anytime.</span>`,
  ],
  clear: () => null,
};

cmdInput.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const raw = cmdInput.value.trim().toLowerCase();
  cmdInput.value = '';

  newLine(`<span class="green">~</span> ${raw}`);

  if (!raw) { window.scrollTo(0, document.body.scrollHeight); return; }

  if (raw === 'clear') {
    out.innerHTML = '';
    window.scrollTo(0, 0);
    return;
  }

  const fn = commands[raw];
  if (fn) {
    fn().forEach(l => newLine(l));
  } else {
    newLine(`<span class="dim">command not found: ${raw}. try 'help'</span>`);
  }

  newLine('');
  window.scrollTo(0, document.body.scrollHeight);
});
</script>
</body>
</html>
